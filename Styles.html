<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #172033;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #2563eb;
  --primary-soft: #eaf1ff;
  --dark: #172033;
  --green: #16a34a;
  --green-soft: #e9f8ef;
  --red: #dc2626;
  --red-soft: #fff0f0;
  --blue: #2563eb;
  --blue-soft: #eaf1ff;
  --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
  --radius: 22px;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: "Google Sans", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
    radial-gradient(circle at top right, rgba(22, 163, 74, 0.10), transparent 24%),
    var(--bg);
  color: var(--text);
}

.app-shell {
  width: min(1440px, calc(100vw - 56px));
  margin: 0 auto;
  padding: 28px 0;
  overflow-x: hidden;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  align-items: center;
  margin-bottom: 24px;
  padding: 26px 28px;
  background: linear-gradient(135deg, #ffffff, #f3f7ff);
  border: 1px solid rgba(37, 99, 235, 0.12);
  border-radius: 28px;
  box-shadow: var(--shadow);
  max-width: 100%;
}

.eyebrow {
  display: inline-block;
  margin-bottom: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .04em;
}

h1, h2, h3, p {
  margin: 0;
}

h1 {
  font-size: 32px;
  letter-spacing: -0.04em;
}

h2 {
  font-size: 24px;
  letter-spacing: -0.02em;
}

p {
  color: var(--muted);
  line-height: 1.5;
}

.topbar p {
  margin-top: 6px;
}

.manager-entry {
  min-width: 300px;
  padding: 14px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.72);
  border: 1px solid rgba(37, 99, 235, 0.14);
  display: grid;
  gap: 12px;
}

.manager-label {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}

.manager-desc {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.manager-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.manager-actions .btn {
  padding: 10px 13px;
}

.main-grid {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(320px, 400px) minmax(0, 1fr);
  gap: 22px;
  align-items: start;
  transition: grid-template-columns 0.22s ease;
  overflow-x: hidden;
}

.main-grid.form-collapsed {
  grid-template-columns: 76px minmax(0, 1fr);
}

.form-panel,
.query-card,
.table-card,
.modal-card {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(229, 231, 235, 0.88);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  min-width: 0;
  max-width: 100%;
}

.sticky-card {
  position: sticky;
  top: 22px;
  padding: 24px;
  overflow: hidden;
}

.form-title-row {
  justify-content: space-between;
  align-items: flex-start;
}

.title-left {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-width: 0;
}

.collapse-btn {
  flex: 0 0 auto;
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 12px;
  background: #f3f4f6;
  color: #374151;
  cursor: pointer;
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
  transition: 0.16s ease;
}

.collapse-btn:hover {
  background: var(--primary-soft);
  color: var(--primary);
}

.main-grid.form-collapsed .form-panel {
  padding: 18px 14px;
}

.main-grid.form-collapsed #ticketForm,
.main-grid.form-collapsed .title-left div {
  display: none;
}

.main-grid.form-collapsed .section-title {
  margin-bottom: 0;
  justify-content: center;
}

.main-grid.form-collapsed .title-left {
  display: none;
}

.main-grid.form-collapsed .collapse-btn {
  margin: 0 auto;
}

.main-grid.form-collapsed #collapseIcon {
  display: inline-block;
  transform: rotate(180deg);
}

.content-panel {
  min-width: 0;
  max-width: 100%;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-x: hidden;
}

.query-card {
  padding: 24px;
}

.query-header {
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  margin-bottom: 18px;
}

.query-icon {
  width: 46px;
  height: 46px;
  border-radius: 18px;
  background: var(--primary-soft);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.query-header h2 {
  font-size: 24px;
}

.query-header p {
  margin-top: 4px;
}

.query-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px;
  gap: 12px;
  margin-top: 12px;
}

.query-row input {
  margin-top: 0;
  height: 52px;
}

.query-btn {
  height: 52px;
  font-size: 17px;
}

.main-filter-row {
  display: grid;
  grid-template-columns: 140px 140px 140px minmax(150px, 1fr) 100px;
  gap: 10px;
  align-items: center;
  margin-top: 14px;
}

.main-filter-row input,
.main-filter-row select {
  margin-top: 0;
}

.section-title {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 18px;
}

.title-icon {
  display: inline-flex;
  width: 34px;
  height: 34px;
  border-radius: 12px;
  align-items: center;
  justify-content: center;
  background: #fff7ed;
  color: #f97316;
  font-weight: 800;
}

label {
  display: block;
  margin: 13px 0;
  color: #374151;
  font-size: 13px;
  font-weight: 700;
}

input,
select,
textarea {
  width: 100%;
  min-width: 0;
  margin-top: 7px;
  padding: 12px 13px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: 0.16s ease;
}

input:focus,
select:focus,
textarea:focus {

  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
}

textarea {

}

small {

}

.two-col {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 12px;
}

.inline-field {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 76px;
  gap: 8px;
  align-items: end;
}

.file-input-hidden {
  display: none;
}

.attachment-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.mini-clear {
  padding: 11px 12px;
}

.attachment-list {
  margin-top: 10px;

  gap: 8px;
}

.attachment-list.empty {
  padding: 12px;
  border-radius: 14px;
  background: #f9fafb;
  border: 1px dashed #d1d5db;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}

.attachment-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 14px;
  background: #f8fbff;
  border: 1px solid #dbeafe;
}

.attachment-name {
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  overflow-wrap: anywhere;
}

.attachment-size {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
}

.attachment-remove {
  border: 0;
  border-radius: 10px;
  background: #fee2e2;
  color: #b91c1c;
  font-weight: 900;
  cursor: pointer;

}

.employee-info-card {

  padding: 14px;
  border-radius: 18px;
  background: #f8fbff;
  border: 1px solid #dbeafe;
}

.employee-info-card.error {
  background: #fff7f7;
  border-color: #fecaca;
}

.employee-info-grid {
  display: grid;
  gap: 8px;
}

.employee-info-row {
  display: grid;
  grid-template-columns: 56px minmax(0, 1fr);
  gap: 10px;
  font-size: 14px;
}

.employee-info-row .label {
  color: var(--muted);
  font-weight: 900;
}

.employee-info-row .value {
  color: var(--text);
  font-weight: 800;

}

.employee-error-title {
  color: var(--red);
  font-weight: 900;
  margin-bottom: 4px;
}

.employee-error-message {
  color: #7f1d1d;
  line-height: 1.5;
}

.btn {
  border: 0;
  border-radius: 14px;
  padding: 12px 16px;
  cursor: pointer;
  font-weight: 800;
  font-size: 14px;
  transition: 0.16s ease;
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn.primary {
  background: var(--primary);
  color: #fff;
}

.btn.secondary {
  background: var(--primary-soft);
  color: var(--primary);
}

.btn.dark {
  background: var(--dark);
  color: #fff;
}

.btn.ghost {
  background: #f3f4f6;
  color: #4b5563;
}

.btn.mini {
  padding: 11px 12px;
  background: #eef2ff;
  color: #3730a3;
}

.btn.full {
  width: 100%;
  margin-top: 10px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(100px, 1fr));
  gap: 12px;
}

.summary-card {
  padding: 17px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: 0 8px 26px rgba(23, 32, 51, 0.05);
}

.summary-card .label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.summary-card .value {
  margin-top: 8px;
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.04em;
}

.summary-card.open .value { color: var(--blue); }
.summary-card.overdue .value { color: var(--red); }
.summary-card.done .value { color: var(--green); }

.table-card {
  overflow: hidden;
}

.table-header {
  padding: 22px;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: center;
  border-bottom: 1px solid var(--line);
}

.table-wrap {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  overflow-y: hidden;
}

table {
  width: 100%;
  max-width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
}

th {
  background: #eaf1ff;
  color: #1e3a8a;
  text-align: left;
  font-size: 12px;
  font-weight: 900;
  padding: 12px 10px;
  border-bottom: 1px solid #c7d7fe;
  white-space: normal;
}

td {
  padding: 13px 10px;
  border-bottom: 1px solid #edf0f4;
  font-size: 13px;
  text-align: left;
  vertical-align: middle;
  word-break: break-word;
  overflow-wrap: anywhere;
}

th:nth-child(1),
td:nth-child(1) {
  width: 70px;   /* 狀態 */
}

th:nth-child(2),
td:nth-child(2) {
  width: 80px;   /* Ticket ID */
}

th:nth-child(3),
td:nth-child(3) {
  width: 96px;   /* 註冊人 */
}

th:nth-child(4),
td:nth-child(4) {
  width: 15%;    /* 註冊主題 */
}

th:nth-child(5),
td:nth-child(5) {
  width: 80px;   /* JIRA Key */
}

th:nth-child(6),
td:nth-child(6) {
  width: 90px;   /* 負責人 */
}

th:nth-child(7),
td:nth-child(7) {
  width: 96px;   /* 建立日期 */
}

th:nth-child(8),
td:nth-child(8) {
  width: 25%;    /* 最新回覆 */
}

tr:hover td {
  background: #fbfdff;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 36px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 8px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 12px;
  white-space: nowrap;
}

.status-open {
  background: var(--blue-soft);
  color: var(--blue);
}

.status-overdue {
  background: var(--red-soft);
  color: var(--red);
}

.status-done {
  background: var(--green-soft);
  color: var(--green);
}

.ticket-link,
.jira-link {
  color: var(--primary);
  font-weight: 500;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}

.ticket-link:hover,
.jira-link:hover {
  color: #1d4ed8;
  text-decoration-thickness: 2px;
}

.ticket-link:visited,
.jira-link:visited {
  color: #4f46e5;
}

.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 1000;
  max-width: 420px;
  padding: 14px 16px;
  border-radius: 16px;
  background: #111827;
  color: white;
  box-shadow: var(--shadow);
  font-weight: 800;
}

.toast.error {
  background: var(--red);
}

.toast.success {
  background: var(--green);
}

.submit-overlay {
  position: fixed;
  inset: 0;
  z-index: 1200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(245, 247, 251, 0.72);
  backdrop-filter: blur(7px);
}

.submit-overlay-card {
  width: min(420px, 100%);
  padding: 28px;
  border-radius: 26px;
  background: #ffffff;
  border: 1px solid rgba(37, 99, 235, 0.14);
  box-shadow: 0 22px 60px rgba(23, 32, 51, 0.16);
  text-align: center;
}

.submit-overlay-card h2 {
  margin-top: 14px;
  font-size: 24px;
  color: var(--text);
}

.submit-overlay-card p {
  margin-top: 10px;
  color: var(--muted);
  line-height: 1.6;
}

.submit-spinner {
  width: 48px;
  height: 48px;
  margin: 0 auto;
  border-radius: 999px;
  border: 5px solid #dbeafe;
  border-top-color: var(--primary);
  animation: submitSpin 0.9s linear infinite;
}

@keyframes submitSpin {
  to {
    transform: rotate(360deg);
  }
}

.btn:disabled {
  opacity: 0.58;
  cursor: not-allowed;
  transform: none;
}

.hidden {
  display: none !important;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.45);
  backdrop-filter: blur(5px);
}

.modal-card {

  overflow: auto;
  padding: 24px;
}

.modal-card.wide {
  width: min(880px, 100%);
}

.modal-card.dashboard-modal {
  width: min(1280px, 96vw);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 18px;
  margin-bottom: 18px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 13px;
  background: #f3f4f6;
  cursor: pointer;
  font-size: 22px;
  line-height: 1;
}

.detail-content {
  display: grid;
  gap: 12px;
}

.detail-row {
  padding: 13px;
  background: #f9fafb;
  border: 1px solid var(--line);
  border-radius: 14px;
}

.detail-row .label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 6px;
}

.detail-row .value {
  white-space: pre-wrap;
  line-height: 1.55;
  word-break: break-word;
}

.filter-row {
  display: grid;
  grid-template-columns: 140px 150px 150px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
}

.filter-row input,
.filter-row select {

}

.modal-table {

}

  margin-top: 16px;
}

.dept-card {

  background: #fff;

}

.dept-card h3 {
  margin: 0 0 14px 0;
}

.dept-stats {

  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.dept-stat {
  padding: 12px;
  border-radius: 14px;
  background: #f9fafb;
}

.dept-stat .label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.dept-stat .value {

  font-weight: 900;
  margin-top: 5px;
}

    gap: 18px;
  }

  .main-filter-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

th:nth-child(1),
td:nth-child(1) {

}

th:nth-child(2),
td:nth-child(2) {

}

th:nth-child(3),
td:nth-child(3) {

th:nth-child(4),
td:nth-child(4) {

th:nth-child(5),
td:nth-child(5) {

}

th:nth-child(6),
td:nth-child(6) {
  width: 90px;   /* 負責人 */
}

th:nth-child(7),
td:nth-child(7) {
  width: 96px;   /* 建立日期 */
}

th:nth-child(8),
td:nth-child(8) {

}

  td, th {

    padding-right: 8px;
    font-size: 12px;
  }
}

@media (max-width: 980px) {
