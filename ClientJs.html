<script>
let APP_STATE = {
  serviceOptions: {
    departments: [],
    categoriesByDepartment: {}
  },
  deptAccess: {
    department: '',
    accessCode: ''
  },
  currentTickets: [],
  currentEmployeeId: '',
  selectedFiles: [],
  isSubmitting: false
};

const MAX_ATTACHMENT_COUNT = 5;
const MAX_ATTACHMENT_SIZE = 10 * 1024 * 1024;

document.addEventListener('DOMContentLoaded', function () {
  bootstrapApp();
});

function bootstrapApp() {
  google.script.run
    .withSuccessHandler(function (data) {
      APP_STATE.serviceOptions = data.serviceOptions || {
        departments: [],
        categoriesByDepartment: {}
      };

      populateTargetDepartments();
      populateAccessDepartments();
      populateMainDepartmentFilter();

      if (data.today) {
        document.getElementById('due_date').value = data.today;
      }
    })
    .withFailureHandler(handleServerError)
    .getInitialData();
}

function populateTargetDepartments() {
  const select = document.getElementById('target_department');
  select.innerHTML = '<option value="">請選擇</option>';

  APP_STATE.serviceOptions.departments.forEach(function (dept) {
    select.innerHTML += `<option value="${escapeHtml(dept)}">${escapeHtml(dept)}</option>`;
  });
}

function populateAccessDepartments() {
  google.script.run
    .withSuccessHandler(function (departments) {
      const select = document.getElementById('deptAccessDepartment');
      select.innerHTML = '';

      departments.forEach(function (dept) {
        select.innerHTML += `<option value="${escapeHtml(dept)}">${escapeHtml(dept)}</option>`;
      });
    })
    .withFailureHandler(handleServerError)
    .getDashboardDepartments();
}

function populateMainDepartmentFilter() {
  const select = document.getElementById('mainFilterDepartment');
  select.innerHTML = '<option value="">全部申請服務部門</option>';

  APP_STATE.serviceOptions.departments.forEach(function (dept) {
    select.innerHTML += `<option value="${escapeHtml(dept)}">${escapeHtml(dept)}</option>`;
  });
}

function handleDepartmentChange() {
  const dept = document.getElementById('target_department').value;
  const categorySelect = document.getElementById('service_category');
  const categories = APP_STATE.serviceOptions.categoriesByDepartment[dept] || [];

  categorySelect.innerHTML = '<option value="">請選擇</option>';

  categories.forEach(function (category) {
    categorySelect.innerHTML += `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`;
  });
}

function handleEmployeeEnter(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    handleEmployeeLookup();
  }
}

function handleQueryEnter(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    handleQueryTickets();
  }
}

function handleEmployeeLookup() {
  const employeeId = document.getElementById('employee_id').value.trim();

  if (!employeeId) {
    renderEmployeeInfoError('請先輸入工號。');
    return;
  }

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res.found) {
        document.getElementById('requester_department').value = '';
        document.getElementById('requester_name').value = '';
        document.getElementById('requester_email').value = '';
        renderEmployeeInfoError(res.message || '查無此工號。');
        return;
      }

      document.getElementById('requester_department').value = res.employee.department || '';
      document.getElementById('requester_name').value = res.employee.name || '';
      document.getElementById('requester_email').value = res.employee.email || '';
      document.getElementById('query_employee_id').value = res.employee.employee_id || employeeId;

      renderEmployeeInfo(res.employee);
      showToast('已帶入員工資料', 'success');
    })
    .withFailureHandler(handleServerError)
    .lookupEmployee(employeeId);
}

function renderEmployeeInfo(employee) {
  const card = document.getElementById('employeeInfoCard');
  const content = document.getElementById('employeeInfoContent');

  card.classList.remove('hidden', 'error');

  content.innerHTML = `
    <div class="employee-info-grid">
      <div class="employee-info-row">
        <div class="label">部門</div>
        <div class="value">${escapeHtml(employee.department || '')}</div>
      </div>
      <div class="employee-info-row">
        <div class="label">姓名</div>
        <div class="value">${escapeHtml(employee.name || '')}</div>
      </div>
      <div class="employee-info-row">
        <div class="label">Email</div>
        <div class="value">${escapeHtml(employee.email || '')}</div>
      </div>
    </div>
  `;
}

function renderEmployeeInfoError(message) {
  const card = document.getElementById('employeeInfoCard');
  const content = document.getElementById('employeeInfoContent');

  card.classList.remove('hidden');
  card.classList.add('error');

  content.innerHTML = `
    <div class="employee-error-title">工號查詢失敗</div>
    <div class="employee-error-message">${escapeHtml(message || '請確認工號是否正確。')}</div>
  `;
}

function openAttachmentPicker() {
  document.getElementById('attachment').click();
}

function handleAttachmentSelect(event) {
  const incomingFiles = event.target.files ? Array.from(event.target.files) : [];

  if (incomingFiles.length === 0) return;

  const accepted = [];
  const rejected = [];

  incomingFiles.forEach(function (file) {
    if (APP_STATE.selectedFiles.length + accepted.length >= MAX_ATTACHMENT_COUNT) {
      rejected.push(file.name + '：超過最多 5 個附件限制');
      return;
    }

    if (file.size > MAX_ATTACHMENT_SIZE) {
      rejected.push(file.name + '：檔案超過 10MB');
      return;
    }

    const isDuplicate = APP_STATE.selectedFiles.concat(accepted).some(function (existing) {
      return existing.name === file.name &&
        existing.size === file.size &&
        existing.lastModified === file.lastModified;
    });

    if (isDuplicate) {
      rejected.push(file.name + '：已經在附件清單中');
      return;
    }

    accepted.push(file);
  });

  APP_STATE.selectedFiles = APP_STATE.selectedFiles.concat(accepted);
  renderAttachmentList();

  event.target.value = '';

  if (accepted.length > 0) {
    showToast('已新增 ' + accepted.length + ' 個附件', 'success');
  }

  if (rejected.length > 0) {
    showToast(rejected.join('；'), 'error');
  }
}

function renderAttachmentList() {
  const el = document.getElementById('attachmentList');
  const files = APP_STATE.selectedFiles || [];

  if (files.length === 0) {
    el.className = 'attachment-list empty';
    el.innerHTML = '尚未新增附件';
    return;
  }

  el.className = 'attachment-list';

  el.innerHTML = files.map(function (file, index) {
    return `
      <div class="attachment-item">
        <div>
          <div class="attachment-name">${escapeHtml(file.name)}</div>
          <div class="attachment-size">${formatFileSize(file.size)}</div>
        </div>
        <button type="button" class="attachment-remove" onclick="removeAttachment(${index})">移除</button>
      </div>
    `;
  }).join('');
}

function removeAttachment(index) {
  APP_STATE.selectedFiles.splice(index, 1);
  renderAttachmentList();
}

function clearAttachments() {
  APP_STATE.selectedFiles = [];
  document.getElementById('attachment').value = '';
  renderAttachmentList();
}

function formatFileSize(bytes) {
  if (!bytes && bytes !== 0) return '';

  if (bytes < 1024) {
    return bytes + ' B';
  }

  if (bytes < 1024 * 1024) {
    return Math.round(bytes / 1024) + ' KB';
  }

  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function readFilesAsAttachments(files) {
  return Promise.all(files.map(function (file) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader();

      reader.onload = function (e) {
        resolve({
          name: file.name,
          mimeType: file.type || 'application/octet-stream',
          size: file.size,
          data: String(e.target.result).split(',')[1]
        });
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }));
}

function setSubmitLoading(isLoading, message) {
  APP_STATE.isSubmitting = isLoading;

  const overlay = document.getElementById('submitOverlay');
  const overlayText = document.getElementById('submitOverlayText');
  const submitBtn = document.getElementById('submitBtn');

  if (overlayText && message) {
    overlayText.textContent = message;
  }

  if (submitBtn) {
    submitBtn.disabled = isLoading;
    submitBtn.textContent = isLoading ? '送出中...' : '送出申請';
  }

  if (overlay) {
    if (isLoading) {
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
    }
  }
}

function handleSubmitTicket(event) {
  event.preventDefault();

  if (APP_STATE.isSubmitting) {
    showToast('申請正在送出中，請勿重複送出。', 'error');
    return;
  }

  const requesterDepartment = document.getElementById('requester_department').value.trim();
  const requesterName = document.getElementById('requester_name').value.trim();
  const requesterEmail = document.getElementById('requester_email').value.trim();

  if (!requesterDepartment || !requesterName || !requesterEmail) {
    renderEmployeeInfoError('請先輸入正確工號並按「驗證」，確認系統帶出部門、姓名與 Email 後再送出。');
    return;
  }

  const form = document.getElementById('ticketForm');
  const files = APP_STATE.selectedFiles || [];

  const payload = {
    employee_id: form.employee_id.value.trim(),
    requester_department: requesterDepartment,
    requester_name: requesterName,
    requester_email: requesterEmail,
    target_department: form.target_department.value.trim(),
    service_category: form.service_category.value.trim(),
    registration_subject: form.registration_subject.value.trim(),
    registration_description: form.registration_description.value.trim(),
    due_date: form.due_date.value,
    attachment_url: '',
    attachments: []
  };

  setSubmitLoading(true, '系統正在讀取附件、建立申請、建立 JIRA 並寄送通知信，請勿重新整理或重複送出。');

  if (files.length > 0) {
    readFilesAsAttachments(files)
      .then(function (attachments) {
        payload.attachments = attachments;
        submitPayload(payload, form);
      })
      .catch(function () {
        setSubmitLoading(false);
        showToast('附件讀取失敗，請重新選擇檔案。', 'error');
      });
  } else {
    submitPayload(payload, form);
  }
}

function submitPayload(payload, form) {
  google.script.run
    .withSuccessHandler(function (res) {
      setSubmitLoading(false);

      if (!res.ok) {
        showToast(res.message || '送出失敗', 'error');
        return;
      }

      showToast(`申請已送出：${res.ticket_id}`, 'success');

      const employeeId = payload.employee_id;
      form.reset();

      document.getElementById('requester_department').value = '';
      document.getElementById('requester_name').value = '';
      document.getElementById('requester_email').value = '';
      document.getElementById('employeeInfoCard').classList.add('hidden');

      APP_STATE.selectedFiles = [];
      renderAttachmentList();

      document.getElementById('query_employee_id').value = employeeId;
      handleQueryTickets();
    })
    .withFailureHandler(function (err) {
      setSubmitLoading(false);
      handleServerError(err);
    })
    .submitTicket(payload);
}

function handleQueryTickets() {
  const employeeId = document.getElementById('query_employee_id').value.trim();

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res.ok) {
        showToast(res.message || '查詢失敗', 'error');
        return;
      }

      APP_STATE.currentTickets = sortTicketsNewestFirst(res.tickets || []);
      APP_STATE.currentEmployeeId = employeeId;

      document.getElementById('tableTitle').textContent = '我的註冊紀錄';
      document.getElementById('tableHint').textContent = `工號 ${employeeId} 的查詢結果`;

      applyMainFilters();
    })
    .withFailureHandler(handleServerError)
    .queryTicketsByEmployee(employeeId);
}

function applyMainFilters() {
  let tickets = (APP_STATE.currentTickets || []).slice();

  const status = document.getElementById('mainFilterStatus').value;
  const startDate = document.getElementById('mainFilterStart').value;
  const endDate = document.getElementById('mainFilterEnd').value;
  const department = document.getElementById('mainFilterDepartment').value;

  if (status) {
    tickets = tickets.filter(function (ticket) {
      return ticket.display_status === status;
    });
  }

  if (department) {
    tickets = tickets.filter(function (ticket) {
      return ticket.target_department === department;
    });
  }

  if (startDate) {
    const start = new Date(startDate);
    tickets = tickets.filter(function (ticket) {
      return parseAnyDate(ticket.created_at) >= start;
    });
  }

  if (endDate) {
    const end = new Date(endDate);
    end.setHours(23, 59, 59, 999);
    tickets = tickets.filter(function (ticket) {
      return parseAnyDate(ticket.created_at) <= end;
    });
  }

  tickets = sortTicketsNewestFirst(tickets);

  renderSummary('summaryCards', buildClientSummary(tickets));
  renderTicketTable('ticketTableBody', tickets);
}

function clearMainFilters() {
  document.getElementById('mainFilterStatus').value = '';
  document.getElementById('mainFilterStart').value = '';
  document.getElementById('mainFilterEnd').value = '';
  document.getElementById('mainFilterDepartment').value = '';

  applyMainFilters();
}

function buildClientSummary(tickets) {
  const summary = {
    total: tickets.length,
    open: 0,
    overdue: 0,
    done: 0
  };

  tickets.forEach(function (ticket) {
    if (ticket.display_status === 'Done') {
      summary.done++;
    } else if (ticket.display_status === 'Overdue') {
      summary.overdue++;
    } else {
      summary.open++;
    }
  });

  return summary;
}

function renderSummary(containerId, summary) {
  const el = document.getElementById(containerId);
  el.classList.remove('hidden');

  el.innerHTML = `
    <div class="summary-card">
      <div class="label">總案件數</div>
      <div class="value">${summary.total || 0}</div>
    </div>
    <div class="summary-card open">
      <div class="label">處理中</div>
      <div class="value">${summary.open || 0}</div>
    </div>
    <div class="summary-card overdue">
      <div class="label">已逾期</div>
      <div class="value">${summary.overdue || 0}</div>
    </div>
    <div class="summary-card done">
      <div class="label">已完成</div>
      <div class="value">${summary.done || 0}</div>
    </div>
  `;
}

function renderTicketTable(tbodyId, tickets) {
  const tbody = document.getElementById(tbodyId);

  if (!tickets || tickets.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">沒有符合條件的 Ticket。</td></tr>`;
    return;
  }

  tbody.innerHTML = tickets.map(function (ticket) {
    return `
      <tr>
        <td>${renderStatus(ticket.display_status)}</td>
        <td><a class="ticket-link" onclick="openTicketDetail('${escapeAttr(ticket.ticket_id)}')">${escapeHtml(ticket.ticket_id)}</a></td>
        <td>${escapeHtml(ticket.requester_name)}</td>
        <td>${escapeHtml(ticket.registration_subject)}</td>
        <td>${renderJira(ticket)}</td>
        <td>${escapeHtml(ticket.jira_assignee || '')}</td>
        <td>${escapeHtml(formatDateOnlyForDisplay(ticket.created_at || ''))}</td>
        <td>${renderLastUpdate(ticket)}</td>
      </tr>
    `;
  }).join('');
}

function renderStatus(status) {
  if (status === 'Done') {
    return `<span class="status-pill status-done">完成</span>`;
  }

  if (status === 'Overdue') {
    return `<span class="status-pill status-overdue">已逾期</span>`;
  }

  return `<span class="status-pill status-open">處理中</span>`;
}

function renderJira(ticket) {
  if (!ticket.jira_key) return '<span class="muted">尚未建立</span>';

  if (ticket.jira_url) {
    return `<a class="jira-link" href="${escapeAttr(ticket.jira_url)}" target="_blank">${escapeHtml(ticket.jira_key)}</a>`;
  }

  return escapeHtml(ticket.jira_key);
}

function renderLastUpdate(ticket) {
  const comment = ticket.jira_last_comment || '';
  const rawDate = ticket.jira_last_comment_at || ticket.updated_at || '';
  const dateText = formatDateOnlyForDisplay(rawDate);

  if (!comment && !dateText) return '';

  const shortComment = comment.length > 38 ? comment.slice(0, 38) + '...' : comment;

  return `
    <div>${escapeHtml(dateText)}</div>
    <small>${escapeHtml(shortComment)}</small>
  `;
}

function clearTicketTable() {
  APP_STATE.currentTickets = [];
  APP_STATE.currentEmployeeId = '';

  document.getElementById('summaryCards').classList.add('hidden');
  document.getElementById('ticketTableBody').innerHTML = `<tr><td colspan="8" class="empty">目前尚未查詢資料。</td></tr>`;
  document.getElementById('tableTitle').textContent = 'Ticket List';
  document.getElementById('tableHint').textContent = '請先輸入工號查詢，或從 Dashboard 進入。';
  clearMainFilters();
}

function openTicketDetail(ticketId) {
  google.script.run
    .withSuccessHandler(function (res) {
      if (!res.ok) {
        showToast(res.message || '找不到 Ticket', 'error');
        return;
      }

      renderTicketDetail(res.ticket);
      openModal('detailModal');
    })
    .withFailureHandler(handleServerError)
    .getTicketDetail(ticketId);
}

function renderTicketDetail(ticket) {
  document.getElementById('detailTitle').textContent = `註冊詳細資料：${ticket.ticket_id}`;

  const fields = [
    ['狀態', renderStatus(ticket.display_status), true],
    ['註冊人部門', ticket.requester_department],
    ['註冊人', ticket.requester_name],
    ['申請服務部門', ticket.target_department],
    ['需求類別', ticket.service_category],
    ['註冊主題', ticket.registration_subject],
    ['註冊說明', ticket.registration_description],
    ['附件', renderAttachmentLinks(ticket.attachment_url), true],
    ['希望完成日', formatDateOnlyForDisplay(ticket.due_date)],
    ['JIRA Key', renderJira(ticket), true],
    ['JIRA 狀態', ticket.jira_status],
    ['JIRA 最新留言', ticket.jira_last_comment],
    ['建立日期', formatDateOnlyForDisplay(ticket.created_at)],
    ['最後更新日期', formatDateOnlyForDisplay(ticket.updated_at)],
    ['完成日期', formatDateOnlyForDisplay(ticket.completed_at)]
  ];

  document.getElementById('detailContent').innerHTML = fields.map(function (field) {
    return `
      <div class="detail-row">
        <div class="label">${escapeHtml(field[0])}</div>
        <div class="value">${field[2] ? field[1] : escapeHtml(field[1] || '')}</div>
      </div>
    `;
  }).join('');
}

function toggleFormPanel() {
  const grid = document.getElementById('mainGrid');
  grid.classList.toggle('form-collapsed');
}

function openDepartmentAccess() {
  openModal('deptAccessModal');
}

function openGmAccess() {
  openModal('gmAccessModal');
}

function handleOpenDeptDashboard() {
  const department = document.getElementById('deptAccessDepartment').value;
  const accessCode = document.getElementById('deptAccessCode').value.trim();

  APP_STATE.deptAccess = {
    department: department,
    accessCode: accessCode
  };

  closeModal('deptAccessModal');
  openModal('deptDashboardModal');

  document.getElementById('deptDashboardTitle').textContent = `${department} Dashboard`;
  populateDeptCategoryFilter(department);
  reloadDeptDashboard();
}

function populateDeptCategoryFilter(department) {
  const select = document.getElementById('deptFilterCategory');
  const categories = APP_STATE.serviceOptions.categoriesByDepartment[department] || [];

  select.innerHTML = '<option value="">全部服務類別</option>';

  categories.forEach(function (category) {
    select.innerHTML += `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`;
  });
}

function reloadDeptDashboard() {
  const filters = {
    department: APP_STATE.deptAccess.department,
    access_code: APP_STATE.deptAccess.accessCode,
    status: document.getElementById('deptFilterStatus').value,
    start_date: document.getElementById('deptFilterStart').value,
    end_date: document.getElementById('deptFilterEnd').value,
    service_category: document.getElementById('deptFilterCategory').value
  };

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res.ok) {
        showToast(res.message || 'Dashboard 權限錯誤', 'error');
        closeModal('deptDashboardModal');
        return;
      }

      renderSummary('deptSummaryCards', res.summary);
      renderTicketTable('deptTicketTableBody', sortTicketsNewestFirst(res.tickets || []));
    })
    .withFailureHandler(handleServerError)
    .getDepartmentDashboardData(filters);
}

function renderAttachmentLinks(attachmentUrlText) {
  const text = String(attachmentUrlText || '').trim();

  if (!text) {
    return '無';
  }

  const urls = text.split(/\n+/).filter(Boolean);

  return urls.map(function (url, index) {
    return `<div><a href="${escapeAttr(url)}" target="_blank">附件 ${index + 1}</a></div>`;
  }).join('');
}

function handleOpenGmDashboard() {
  const accessCode = document.getElementById('gmAccessCode').value.trim();

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res.ok) {
        showToast(res.message || 'GM Dashboard 權限錯誤', 'error');
        return;
      }

      closeModal('gmAccessModal');
      openModal('gmDashboardModal');

      renderSummary('gmTotalCards', res.totalSummary);
      renderGmDepartments(res.departments);
    })
    .withFailureHandler(handleServerError)
    .getGmDashboardData({
      access_code: accessCode
    });
}

function renderGmDepartments(departments) {
  const el = document.getElementById('gmDepartmentGrid');

  if (!departments || departments.length === 0) {
    el.innerHTML = `<div class="empty">目前沒有資料。</div>`;
    return;
  }

  el.innerHTML = departments.map(function (item) {
    const s = item.summary || {};
    return `
      <div class="dept-card">
        <h3>${escapeHtml(item.department)}</h3>
        <div class="dept-stats">
          <div class="dept-stat">
            <div class="label">總案件數</div>
            <div class="value">${s.total || 0}</div>
          </div>
          <div class="dept-stat">
            <div class="label">處理中</div>
            <div class="value" style="color:#2563eb">${s.open || 0}</div>
          </div>
          <div class="dept-stat">
            <div class="label">已逾期</div>
            <div class="value" style="color:#dc2626">${s.overdue || 0}</div>
          </div>
          <div class="dept-stat">
            <div class="label">已完成</div>
            <div class="value" style="color:#16a34a">${s.done || 0}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function sortTicketsNewestFirst(tickets) {
  return (tickets || []).slice().sort(function (a, b) {
    return getTicketNumber(b.ticket_id) - getTicketNumber(a.ticket_id);
  });
}

function getTicketNumber(ticketId) {
  const match = String(ticketId || '').match(/(\d+)$/);
  return match ? Number(match[1]) : 0;
}

function formatDateOnlyForDisplay(value) {
  if (!value) return '';

  const text = String(value).trim();

  const ymdDash = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (ymdDash) {
    return `${ymdDash[1]}/${ymdDash[2]}/${ymdDash[3]}`;
  }

  const ymdSlash = text.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (ymdSlash) {
    return `${ymdSlash[1]}/${pad2(ymdSlash[2])}/${pad2(ymdSlash[3])}`;
  }

  const date = new Date(text);
  if (!isNaN(date.getTime())) {
    return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
  }

  return text.split(' ')[0] || text;
}

function parseAnyDate(value) {
  if (!value) return new Date('Invalid Date');

  const text = String(value).trim();

  const ymdDash = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (ymdDash) {
    return new Date(Number(ymdDash[1]), Number(ymdDash[2]) - 1, Number(ymdDash[3]));
  }

  const ymdSlash = text.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (ymdSlash) {
    return new Date(Number(ymdSlash[1]), Number(ymdSlash[2]) - 1, Number(ymdSlash[3]));
  }

  return new Date(text);
}

function pad2(value) {
  return String(value).padStart(2, '0');
}

function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + (type || '');
  toast.classList.remove('hidden');

  setTimeout(function () {
    toast.classList.add('hidden');
  }, 3200);
}

function handleServerError(err) {
  console.error(err);
  showToast(err && err.message ? err.message : '系統錯誤，請稍後再試。', 'error');
}

function escapeHtml(value) {
  if (value === null || value === undefined) return '';

  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeAttr(value) {
  return escapeHtml(value).replaceAll('`', '&#096;');
}
</script>
